<link rel="stylesheet" href="../css/main.css">

</head>


<body>


<div class="settings-container">


    <img src="../assets/logo.png"
    width="90"
    class="pulse">


    <h1>KDK Core Settings</h1>



    <!-- Profile -->

    <div class="settings-card">

        <h2>👤 Profile</h2>

        <p>
        Username:
        <strong>Denis</strong>
        </p>

    </div>



    <!-- Theme -->

    <div class="settings-card">

        <h2>🌙 Appearance</h2>


        <button onclick="toggleTheme()">

            Toggle Theme

        </button>


    </div>



    <!-- Memory -->

    <div class="settings-card">

        <h2>🧠 Memory</h2>


        <button onclick="clearChatHistory()">

            Clear Chat History

        </button>


    </div>



    <!-- Information -->

    <div class="settings-card">

        <h2>ℹ️ About</h2>


        <p>
        KDK Core Version: 1.0
        </p>


        <p>
        Created by KDK JAJAWO MEDIA
        </p>

    <a href="../index.html">

        <button class="new-chat">

            Return To Chat

        </button>

    </a>
